<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUMANITY LAST BLOG BLOG // 2026</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="layout-wrapper">
        <header class="main-header">
            <div class="header-inner container">
                <div class="brand">
                    <div class="brand-box"></div>
                    <h1>HUMANITY LAST BLOG</h1>
                </div>
            </div>
        </header>

        <div class="main-content container mt-gap">
            <div class="content-grid">
                <!-- MAIN FEED -->
                <main id="app">
                    <div class="loading">
                        <div class="pixel-loader"></div>
                    </div>
                </main>

                <!-- MINIMALIST SIDEBAR -->
                <aside class="sidebar">
                    <section class="sidebar-section">
                        <h3 class="section-title">SEARCH DATABASE</h3>
                        <div class="search-wrap">
                            <input type="text" id="search-input" placeholder="[ SCAN_KEYWORD ]">
                            <span class="cursor">_</span>
                        </div>
                    </section>

                    <section class="sidebar-section">
                        <h3 class="section-title">▣ CATEGORIES</h3>
                        <ul class="cat-list" id="category-list">
                            <li><a href="#">/development</a></li>
                            <li><a href="#">/design</a></li>
                            <li><a href="#">/ai-agents</a></li>
                        </ul>
                    </section>

                    <section class="sidebar-section">
                        <h3 class="section-title">◈ LATEST_POSTS</h3>
                        <div id="latest-list" class="latest-scans">
                            <!-- Populated by JS -->
                        </div>
                    </section>

                    <section class="sidebar-section system-status">
                        <h3 class="section-title">⚙ SYSTEM_STATUS</h3>
                        <p>NETWORK: OK</p>
                        <p>UPTIME: 99.9%</p>
                        <p>LOCATION: SECTOR-7</p>
                    </section>
                </aside>
            </div>
        </div>

        <footer class="main-footer">
            <div class="container footer-inner">
                <p>&copy; 2026 HUMANITY LAST BLOG // SECURE CONNECTION ESTABLISHED</p>
                <div class="footer-links">
                    <a href="#">RSS</a>
                    <a href="#">SOURCE</a>
                    <a href="#">LEGAL</a>
                </div>
            </div>
        </footer>
    </div>

    <!-- MODAL -->
    <div id="post-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal">✖ TERMINATE_SESSION</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let allPosts = [];

        async function fetchPosts() {
            try {
                const response = await fetch('api.php');
                if (!response.ok) throw new Error('Network response was not ok');
                allPosts = await response.json();
                renderPosts(allPosts);
                renderLatest(allPosts);
                renderCategories(allPosts);
            } catch (error) {
                console.error('Error fetching posts:', error);
                document.getElementById('app').innerHTML = `<div class="post-item">System Error: Fail during database read.</div>`;
            }
        }

        function renderPosts(posts) {
            const app = document.getElementById('app');
            if (posts.length === 0) {
                app.innerHTML = `
                    <article class="post-item">
                        <header class="item-header">
                            <span class="post-date">ERR_NO_DATA</span>
                            <span class="post-tag">▣ SYSTEM</span>
                        </header>
                        <h2 class="post-title">NO ACCESS LOGS FOUND</h2>
                        <p class="post-excerpt">The content database appears to be empty or not yet synchronized. Please check your source repository and webhook configuration.</p>
                    </article>
                `;
                return;
            }
            app.innerHTML = posts.map(post => `
                <article class="post-item">
                    <header class="item-header">
                        <span class="post-date">${post.date}</span>
                        <span class="post-tag">▣ ${post.category}</span>
                    </header>
                    <h2 class="post-title"><a href="#/${post.slug}" onclick="openPostBySlug('${post.slug}'); return false;">${post.title}</a></h2>
                    <p class="post-excerpt">${post.rawMarkdown.substring(0, 180)}...</p>
                    <footer class="item-footer">
                        <a href="#/${post.slug}" class="read-more" onclick="openPostBySlug('${post.slug}'); return false;">▶ ACCESS_LOG</a>
                    </footer>
                </article>
            `).join('');
        }


        function renderLatest(posts) {
            const list = document.getElementById('latest-list');
            list.innerHTML = posts.slice(0, 3).map(post => `
                <div class="scan-item" onclick="openPostBySlug('${post.slug}')">
                    <span class="scan-date">${post.date}</span>
                    <h4>${post.title}</h4>
                </div>
            `).join('');
        }

        function renderCategories(posts) {
            const list = document.getElementById('category-list');
            const cats = [...new Set(posts.map(p => p.category))];
            if (cats.length > 0) {
                list.innerHTML = cats.map(c => `<li><a href="#" onclick="filterByCategory('${c}'); return false;">/ ${c.toLowerCase()}</a></li>`).join('') + 
                                `<li><a href="#" onclick="renderPosts(allPosts); return false;">/ all_posts</a></li>`;
            }
        }

        function filterByCategory(cat) {
            const filtered = allPosts.filter(p => p.category === cat);
            renderPosts(filtered);
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allPosts.filter(p => 
                p.title.toLowerCase().includes(query) || 
                p.rawMarkdown.toLowerCase().includes(query) ||
                p.tags.some(t => t.toLowerCase().includes(query))
            );
            renderPosts(filtered);
        });

        function openPostBySlug(slug) {
            const post = allPosts.find(p => p.slug === slug);
            if (!post) return;
            
            // Update URL hash
            window.location.hash = `/${slug}`;
            
            const modal = document.getElementById('post-modal');
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <header class="modal-post-header">
                    <span class="date">${post.date}</span>
                    <h1>${post.title}</h1>
                </header>
                <div class="modal-article-content">
                    ${marked.parse(post.rawMarkdown).replace(/(src|href)="\.\/assets\/([^"]+)"/g, '$1="/content/assets/$2"')}
                </div>
            `;
            modal.style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function checkHash() {
            const hash = window.location.hash;
            if (hash.startsWith('#/')) {
                const slug = hash.substring(2);
                // Wait for posts to be loaded
                if (allPosts.length > 0) {
                    openPostBySlug(slug);
                } else {
                    // Try again in 100ms
                    setTimeout(checkHash, 100);
                }
            } else {
                closeModal();
            }
        }

        function closeModal() {
            document.getElementById('post-modal').style.display = "none";
            document.body.style.overflow = "auto";
            if (window.location.hash.startsWith('#/')) {
                history.pushState("", document.title, window.location.pathname + window.location.search);
            }
        }

        window.onhashchange = checkHash;

        document.querySelector('.close-modal').onclick = closeModal;

        document.addEventListener('DOMContentLoaded', () => {
            fetchPosts().then(checkHash);
        });
    </script>
</body>

</html>
