    <script>
        let allPosts = [];

        function calcReadingTime(markdown) {
            const words = markdown.trim().split(/\s+/).length;
            const minutes = Math.max(1, Math.round(words / 200));
            return minutes;
        }

        function humanDate(dateStr) {
            const now = new Date();
            const d = new Date(dateStr + 'T00:00:00');
            const diffMs = now - d;
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays <= 6) return `${diffDays} days ago`;
            if (diffDays <= 13) return 'Last week';
            if (diffDays <= 20) return '2 weeks ago';
            if (diffDays <= 27) return '3 weeks ago';
            if (diffDays <= 45) return 'This month';
            if (diffDays <= 75) return 'Last month';

            const months = Math.round(diffDays / 30);
            if (months < 12) return `${months} months ago`;
            const years = Math.round(diffDays / 365);
            return years === 1 ? 'A year ago' : `${years} years ago`;
        }

        function showReadingTime(minutes) {
            const badge = document.getElementById('reading-time-badge');
            const text = document.getElementById('reading-time-text');
            text.textContent = `⏱ ${minutes} MIN READ`;
            badge.style.display = 'block';
        }

        function hideReadingTime() {
            document.getElementById('reading-time-badge').style.display = 'none';
        }

        function renderFeed(posts, isSearchResult = false) {
            hideReadingTime();
            const app = document.getElementById('app');
            if (posts.length === 0) {
                app.innerHTML = isSearchResult ? `
                    <article class="post-item">
                        <h2 class="post-title">NO RESULTS FOUND</h2>
                        <p class="post-excerpt">Your search query did not match any stored records in the database. Scan failed.</p>
                    </article>
                ` : `
                    <article class="post-item">
                        <header class="item-header">
                            <span class="post-date">ERR_NO_DATA</span>
                            <span class="post-tag">▣ SYSTEM</span>
                        </header>
                        <h2 class="post-title">NO ACCESS LOGS FOUND</h2>
                        <p class="post-excerpt">The content database appears to be empty or not yet synchronized. Please check your source repository and webhook configuration.</p>
                    </article>
                `;
                return;
            }
            app.innerHTML = posts.map(post => `
                <article class="post-item">
                    <header class="item-header">
                        <span class="post-date">${post.date}</span>
                        <span class="post-human-date">${humanDate(post.date)}</span>
                        <span class="post-tag">▣ ${post.category}</span>
                    </header>
                    <h2 class="post-title"><a href="#/${post.path}">${post.title}</a></h2>
                    <p class="post-excerpt">${post.description || post.rawMarkdown.substring(0, 180) + '...'}</p>
                    <footer class="item-footer">
                        <a href="#/${post.path}" class="read-more">▶ ACCESS_LOG</a>
                        <span class="feed-read-time">⏱ ${calcReadingTime(post.rawMarkdown)} min</span>
                    </footer>
                </article>
            `).join('');
        }

        function renderPostDetail(path) {
            const index = allPosts.findIndex(p => p.path === path);
            const post = allPosts[index];
            const app = document.getElementById('app');
            if (!post) {
                app.innerHTML = `<div class="post-item">Error: Post not found in database.</div>`;
                return;
            }

            const prevPost = index < allPosts.length - 1 ? allPosts[index + 1] : null;
            const nextPost = index > 0 ? allPosts[index - 1] : null;

            const relatedPosts = allPosts
                .filter(p => p.path !== path && (p.category === post.category || p.tags.some(t => post.tags.includes(t))))
                .sort(() => 0.5 - Math.random())
                .slice(0, 3);

            const minutes = calcReadingTime(post.rawMarkdown);
            showReadingTime(minutes);

            app.innerHTML = `
                <article class="post-detail">
                    <header class="detail-header">
                        <a href="#" class="back-link" onclick="window.location.hash=''; return false;">◀ BACK_TO_FEED</a>
                        <span class="date">${post.date} <span class="human-date-inline">(${humanDate(post.date)})</span> | ▣ ${post.category}</span>
                        <h1>${post.title}</h1>
                    </header>
                    <div class="article-body">
                        ${marked.parse(post.rawMarkdown).replace(/(src|href)="\.\/assets\/([^"]+)"/g, '$1="/content/assets/$2"')}
                    </div>
                    
                    <footer class="detail-footer">
                        <div class="tags">TAGS: ${post.tags.map(t => `<span class="tag">#${t}</span>`).join(' ')}</div>
                        
                        <nav class="post-navigation">
                            ${prevPost ? `
                                <a href="#/${prevPost.path}" class="nav-prev">
                                    <span class="nav-label">◀ PREVIOUS_LOG</span>
                                    <span class="nav-title">${prevPost.title}</span>
                                </a>
                            ` : `<div class="nav-spacer"></div>`}
                            ${nextPost ? `
                                <a href="#/${nextPost.path}" class="nav-next">
                                    <span class="nav-label">NEXT_LOG ▶</span>
                                    <span class="nav-title">${nextPost.title}</span>
                                </a>
                            ` : `<div class="nav-spacer"></div>`}
                        </nav>

                        ${relatedPosts.length > 0 ? `
                            <div class="related-posts">
                                <h3 class="related-title">▣ RELATED_DATABASE_ENTRIES</h3>
                                <div class="related-grid">
                                    ${relatedPosts.map(p => `
                                        <div class="related-card" onclick="window.location.hash='#/${p.path}'">
                                            <span class="related-cat">/${p.category}</span>
                                            <h4>${p.title}</h4>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </footer>
                </article>
            `;
            
            // Add click handlers for images (lightbox)
            const images = app.querySelectorAll('.article-body img');
            images.forEach(img => {
                img.setAttribute('loading', 'lazy');
                img.onclick = function() {
                    const lightbox = document.getElementById('lightbox');
                    const lightboxImg = document.getElementById('lightbox-img');
                    const captionText = document.getElementById('lightbox-caption');
                    lightbox.style.display = "flex";
                    lightboxImg.src = this.src;
                    captionText.innerHTML = this.alt;
                }
            });

            // Initialize Syntax Highlighting
            app.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            // Initialize Math Formulas
            if (window.renderMathInElement) {
                renderMathInElement(app, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
            }

            window.scrollTo(0, 0);
        }

        function renderLegal() {
            hideReadingTime();
            window.location.hash = '#/legal';
            const app = document.getElementById('app');
            app.innerHTML = `
                <article class="post-detail">
                    <header class="detail-header">
                        <a href="#" class="back-link" onclick="window.location.hash=''; return false;">◀ BACK_TO_FEED</a>
                        <h1>LEGAL NOTICE</h1>
                    </header>
                    <div class="article-body legal-body">
                        <h2>About This Website</h2>
                        <p>This website is maintained and updated by <strong>rzafiamy</strong> from a public GitHub repository. It serves as a personal blog to share knowledge and experience on Artificial Intelligence, accumulated over several years of testing and development.</p>

                        <h2>Hosting & Infrastructure</h2>
                        <p>Hosted on <strong>infodev.ovh</strong> infrastructure. Domain name provided by <strong>OVH Cloud</strong>.</p>

                        <h2>Source Code</h2>
                        <p>The source code of this blog platform is open-source and available on GitHub under the Apache 2.0 license. Contributions and forks are welcome.</p>
                        <p><a href="https://github.com/rzafiamy" target="_blank" rel="noopener">github.com/rzafiamy</a></p>

                        <h2>Content License</h2>
                        <p>All blog content (articles, posts) published on this site is licensed under <strong>GPL v3.0</strong>. You are free to share and adapt the content under the same terms.</p>

                        <h2>Privacy</h2>
                        <p>This site does not use cookies, does not track visitors, and does not collect any personal data. No analytics or third-party trackers are embedded.</p>

                        <h2>Contact</h2>
                        <p>For any inquiries, please reach out via the GitHub repository linked above.</p>
                    </div>
                </article>
            `;
            window.scrollTo(0, 0);
        }

        function renderLatest(posts) {
            const list = document.getElementById('latest-list');
            list.innerHTML = posts.slice(0, 3).map(post => `
                <div class="scan-item" onclick="window.location.hash = '#/${post.path}'">
                    <span class="scan-date">${post.date} · ${humanDate(post.date)}</span>
                    <h4>${post.title}</h4>
                </div>
            `).join('');
        }

        function renderCategories(posts) {
            const list = document.getElementById('category-list');
            const cats = [...new Set(posts.map(p => p.category))];
            if (cats.length > 0) {
                list.innerHTML = cats.map(c => `<li><a href="#" onclick="filterByCategory('${c}'); return false;">/ ${c.toLowerCase()}</a></li>`).join('') +
                                `<li><a href="#" onclick="window.location.hash = ''; return false;">/ all_posts</a></li>`;
            }
        }

        function filterByCategory(cat) {
            window.location.hash = '';
            const filtered = allPosts.filter(p => p.category === cat);
            renderFeed(filtered);
        }

        function handleSearch() {
            window.location.hash = '';
            const query = document.getElementById('search-input').value.toLowerCase();
            if (!query) {
                renderFeed(allPosts);
                return;
            }
            const filtered = allPosts.filter(p =>
                p.title.toLowerCase().includes(query) ||
                p.rawMarkdown.toLowerCase().includes(query) ||
                p.category.toLowerCase().includes(query) ||
                p.slug.toLowerCase().includes(query) ||
                p.tags.some(t => t.toLowerCase().includes(query))
            );
            renderFeed(filtered, true);
        }

        function checkHash() {
            const hash = window.location.hash;
            if (hash === '#/legal') {
                renderLegal();
            } else if (hash.startsWith('#/')) {
                const path = hash.substring(2);
                if (allPosts.length > 0) {
                    renderPostDetail(path);
                } else {
                    setTimeout(checkHash, 100);
                }
            } else {
                hideReadingTime();
                if (allPosts.length > 0) renderFeed(allPosts);
            }
        }

        async function fetchPosts() {
            try {
                const response = await fetch('api.php');
                if (!response.ok) throw new Error('Network response was not ok');
                allPosts = await response.json();

                checkHash();
                renderLatest(allPosts);
                renderCategories(allPosts);
            } catch (error) {
                console.error('Error fetching posts:', error);
                document.getElementById('app').innerHTML = `<div class="post-item">System Error: Fail during database read.</div>`;
            }
        }

        window.onhashchange = checkHash;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('search-input').addEventListener('input', handleSearch);
            fetchPosts();
        });
    </script>
