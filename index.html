<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUMANITY LAST BLOG BLOG // 2026</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="layout-wrapper">
        <header class="main-header">
            <div class="header-inner container">
                <div class="brand">
                    <div class="brand-box"></div>
                    <h1>HUMANITY LAST BLOG</h1>
                </div>
            </div>
        </header>

        <div class="main-content container mt-gap">
            <div class="content-grid">
                <!-- MAIN FEED -->
                <main id="app">
                    <div class="loading">
                        <div class="pixel-loader"></div>
                    </div>
                </main>

                <!-- MINIMALIST SIDEBAR -->
                <aside class="sidebar">
                    <section class="sidebar-section">
                        <h3 class="section-title">SEARCH DATABASE</h3>
                        <div class="search-wrap">
                            <input type="text" id="search-input" placeholder="[ SCAN_KEYWORD ]">
                            <span class="cursor">_</span>
                        </div>
                    </section>

                    <section class="sidebar-section">
                        <h3 class="section-title">▣ CATEGORIES</h3>
                        <ul class="cat-list" id="category-list">
                            <li><a href="#">/development</a></li>
                            <li><a href="#">/design</a></li>
                            <li><a href="#">/ai-agents</a></li>
                        </ul>
                    </section>

                    <section class="sidebar-section">
                        <h3 class="section-title">◈ LATEST_POSTS</h3>
                        <div id="latest-list" class="latest-scans">
                            <!-- Populated by JS -->
                        </div>
                    </section>

                    <section class="sidebar-section system-status">
                        <h3 class="section-title">⚙ SYSTEM_STATUS</h3>
                        <p>NETWORK: OK</p>
                        <p>UPTIME: 99.9%</p>
                        <p>LOCATION: SECTOR-7</p>
                    </section>
                </aside>
            </div>
        </div>

        <footer class="main-footer">
            <div class="container footer-inner">
                <p>&copy; 2026 HUMANITY LAST BLOG // SECURE CONNECTION ESTABLISHED</p>
                <div class="footer-links">
                    <a href="#">RSS</a>
                    <a href="#">SOURCE</a>
                    <a href="#">LEGAL</a>
                </div>
            </div>
        </footer>
    </div>

    <!-- REMOVED MODAL HTML -->

    <script>
        let allPosts = [];

        async function fetchPosts() {
            try {
                const response = await fetch('api.php');
                if (!response.ok) throw new Error('Network response was not ok');
                allPosts = await response.json();
                
                // Initial routing
                checkHash();
                
                renderLatest(allPosts);
                renderCategories(allPosts);
            } catch (error) {
                console.error('Error fetching posts:', error);
                document.getElementById('app').innerHTML = `<div class="post-item">System Error: Fail during database read.</div>`;
            }
        }

        function renderFeed(posts, isSearchResult = false) {
            const app = document.getElementById('app');
            if (posts.length === 0) {
                app.innerHTML = isSearchResult ? `
                    <article class="post-item">
                        <h2 class="post-title">NO RESULTS FOUND</h2>
                        <p class="post-excerpt">Your search query did not match any stored records in the database. Scan failed.</p>
                    </article>
                ` : `
                    <article class="post-item">
                        <header class="item-header">
                            <span class="post-date">ERR_NO_DATA</span>
                            <span class="post-tag">▣ SYSTEM</span>
                        </header>
                        <h2 class="post-title">NO ACCESS LOGS FOUND</h2>
                        <p class="post-excerpt">The content database appears to be empty or not yet synchronized. Please check your source repository and webhook configuration.</p>
                    </article>
                `;
                return;
            }
            app.innerHTML = posts.map(post => `
                <article class="post-item">
                    <header class="item-header">
                        <span class="post-date">${post.date}</span>
                        <span class="post-tag">▣ ${post.category}</span>
                    </header>
                    <h2 class="post-title"><a href="#/${post.path}">${post.title}</a></h2>
                    <p class="post-excerpt">${post.rawMarkdown.substring(0, 180)}...</p>
                    <footer class="item-footer">
                        <a href="#/${post.path}" class="read-more">▶ ACCESS_LOG</a>
                    </footer>
                </article>
            `).join('');
        }

        function renderPostDetail(path) {
            const post = allPosts.find(p => p.path === path);
            const app = document.getElementById('app');
            if (!post) {
                app.innerHTML = `<div class="post-item">Error: Post not found in database.</div>`;
                return;
            }
            
            app.innerHTML = `
                <article class="post-detail">
                    <header class="detail-header">
                        <a href="#" class="back-link">◀ BACK_TO_FEED</a>
                        <span class="date">${post.date} | ▣ ${post.category}</span>
                        <h1>${post.title}</h1>
                    </header>
                    <div class="article-body">
                        ${marked.parse(post.rawMarkdown).replace(/(src|href)="\.\/assets\/([^"]+)"/g, '$1="/content/assets/$2"')}
                    </div>
                    <footer class="detail-footer">
                        <div class="tags">TAGS: ${post.tags.map(t => `<span class="tag">#${t}</span>`).join(' ')}</div>
                    </footer>
                </article>
            `;
            window.scrollTo(0, 0);
        }

        function renderLatest(posts) {
            const list = document.getElementById('latest-list');
            list.innerHTML = posts.slice(0, 3).map(post => `
                <div class="scan-item" onclick="window.location.hash = '#/${post.path}'">
                    <span class="scan-date">${post.date}</span>
                    <h4>${post.title}</h4>
                </div>
            `).join('');
        }

        function renderCategories(posts) {
            const list = document.getElementById('category-list');
            const cats = [...new Set(posts.map(p => p.category))];
            if (cats.length > 0) {
                list.innerHTML = cats.map(c => `<li><a href="#" onclick="filterByCategory('${c}'); return false;">/ ${c.toLowerCase()}</a></li>`).join('') + 
                                `<li><a href="#" onclick="window.location.hash = ''; return false;">/ all_posts</a></li>`;
            }
        }

        function filterByCategory(cat) {
            window.location.hash = ''; 
            const filtered = allPosts.filter(p => p.category === cat);
            renderFeed(filtered);
        }

        function handleSearch() {
            window.location.hash = ''; 
            const query = document.getElementById('search-input').value.toLowerCase();
            if (!query) {
                renderFeed(allPosts);
                return;
            }
            const filtered = allPosts.filter(p => 
                p.title.toLowerCase().includes(query) || 
                p.rawMarkdown.toLowerCase().includes(query) ||
                p.category.toLowerCase().includes(query) ||
                p.slug.toLowerCase().includes(query) ||
                p.tags.some(t => t.toLowerCase().includes(query))
            );
            renderFeed(filtered, true);
        }

        function checkHash() {
            const hash = window.location.hash;
            if (hash.startsWith('#/')) {
                const path = hash.substring(2);
                if (allPosts.length > 0) {
                    renderPostDetail(path);
                } else {
                    setTimeout(checkHash, 100);
                }
            } else {
                if (allPosts.length > 0) renderFeed(allPosts);
            }
        }

        window.onhashchange = checkHash;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('search-input').addEventListener('input', handleSearch);
            fetchPosts();
        });
    </script>
</body>

</html>
